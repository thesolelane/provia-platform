# ============================================================
# docker-compose.yml
# PREFERRED BUILDERS AI SYSTEM
# 
# HOW TO USE:
#   Start:   docker-compose up -d
#   Stop:    docker-compose down
#   Logs:    docker-compose logs -f
#   Backup:  bash scripts/backup.sh
#
# MOVE TO NEW SERVER:
#   1. Copy entire project folder to new server
#   2. Install Docker on new server
#   3. Copy .env and fill in your values
#   4. Run: docker-compose up -d
# ============================================================

version: '3.9'

services:

  # ── MAIN APP SERVER ──────────────────────────────────────
  app:
    build: .
    container_name: pb_app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - BOT_EMAIL=${BOT_EMAIL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - HEARTH_API_KEY=${HEARTH_API_KEY}
      - HEARTH_WEBHOOK_SECRET=${HEARTH_WEBHOOK_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - OWNER_WHATSAPP=${OWNER_WHATSAPP}
      - JACKSON_WHATSAPP=${JACKSON_WHATSAPP}
      - OWNER_EMAIL=${OWNER_EMAIL}
      - APP_URL=${APP_URL}
      - PB_FROM_EMAIL=${PB_FROM_EMAIL}
      - ESTIMATION_PLATFORM=${ESTIMATION_PLATFORM}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - WAVE_ACCESS_TOKEN=${WAVE_ACCESS_TOKEN}
      - WAVE_BUSINESS_ID=${WAVE_BUSINESS_ID}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./knowledge-base:/app/knowledge-base
    networks:
      - pb_network

  # ── NGINX REVERSE PROXY ──────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: pb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - pb_network

networks:
  pb_network:
    driver: bridge
